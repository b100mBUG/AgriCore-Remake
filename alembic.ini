[alembic]
# URL is overridden in env.py from settings — this is just a placeholder
sqlalchemy.url = postgresql+asyncpg://neondb_owner:npg_lDCri3e2fouc@ep-rough-hill-atpbla0r-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require

script_location = alembic
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
